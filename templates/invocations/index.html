{% extends "base.html" %}

{% block content %}
<div class="space-y-8">
  <div>
    <h1 class="text-3xl font-semibold tracking-tight">Invocations</h1>
    <p class="mt-2 text-sm text-slate-600">Recent invocation state with HTMX-driven filtering.</p>
  </div>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200 px-5 py-4">
      <form class="grid gap-4 md:grid-cols-3 xl:grid-cols-6"
            hx-get="/ui/invocations"
            hx-target="#invocation-results"
            hx-push-url="true">
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Status</span>
          <select name="status" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="" {% if filters.status == "" %}selected{% endif %}>Any</option>
            <option value="running" {% if filters.status == "running" %}selected{% endif %}>Running</option>
            <option value="succeeded" {% if filters.status == "succeeded" %}selected{% endif %}>Succeeded</option>
            <option value="failed" {% if filters.status == "failed" %}selected{% endif %}>Failed</option>
            <option value="canceled" {% if filters.status == "canceled" %}selected{% endif %}>Canceled</option>
          </select>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Execution Mode</span>
          <select name="execution_mode" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="" {% if filters.execution_mode == "" %}selected{% endif %}>Any</option>
            <option value="local" {% if filters.execution_mode == "local" %}selected{% endif %}>Local</option>
            <option value="server" {% if filters.execution_mode == "server" %}selected{% endif %}>Server</option>
          </select>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Queue</span>
          <input name="worker_queue" value="{{ filters.worker_queue }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Claimed By</span>
          <input name="claimed_by" value="{{ filters.claimed_by }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Cancel State</span>
          <select name="cancel_state" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <option value="" {% if filters.cancel_state == "" %}selected{% endif %}>Any</option>
            <option value="none" {% if filters.cancel_state == "none" %}selected{% endif %}>None</option>
            <option value="requested" {% if filters.cancel_state == "requested" %}selected{% endif %}>Requested</option>
            <option value="completed" {% if filters.cancel_state == "completed" %}selected{% endif %}>Completed</option>
          </select>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Limit</span>
          <input name="limit" value="{{ filters.limit }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </label>
      </form>
    </div>
    <div id="invocation-results" class="overflow-x-auto px-5 py-4">
      {% include "invocations/_table.html" %}
    </div>
  </section>
</div>
{% endblock %}
