{% extends "base.html" %}

{% block content %}
<div class="space-y-8">
  <div>
    <h1 class="text-3xl font-semibold tracking-tight">Catalog</h1>
    <p class="mt-2 text-sm text-slate-600">Browse dbt resources across projects and environments.</p>
  </div>

  <section id="models-section" class="rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200 px-5 py-4">
      <form id="model-filters"
            class="grid gap-4 md:grid-cols-3"
            hx-get="/ui/catalog"
            hx-trigger="change delay:100ms"
            hx-target="#models-section"
            hx-select="#models-section"
            hx-swap="outerHTML"
            hx-push-url="true">
        <div class="text-sm text-slate-600">
          <span class="mb-1 block">Project</span>
          <select name="project_id" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">
            {% for p in filters.projects %}
            <option value="{{ p.value }}" {% if p.selected %}selected{% endif %}>{{ p.label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="text-sm text-slate-600">
          <span class="mb-1 block">Environment</span>
          <select name="environment_slug" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">
            {% for e in filters.environments %}
            <option value="{{ e.value }}" {% if e.selected %}selected{% endif %}>{{ e.label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="text-sm text-slate-600">
          <span class="mb-1 block">Resource Type</span>
          <div class="relative" x-data="multiSelectDropdown('Resource Type')" @click.outside="close()">
            <button type="button" @click="toggle()" class="flex w-full items-center justify-between rounded-lg border border-slate-300 bg-white px-3 py-2 text-left text-sm text-slate-700 shadow-sm">
              <span x-text="buttonLabel()"></span>
              <span class="text-slate-400">▾</span>
            </button>
            <div x-show="open" x-cloak class="absolute z-20 mt-2 w-full rounded-xl border border-slate-200 bg-white p-2 shadow-lg">
              <div class="max-h-64 space-y-1 overflow-y-auto">
                {% for option in filters.resource_types %}
                <label class="flex cursor-pointer items-center gap-3 rounded-lg px-3 py-2 hover:bg-slate-50">
                  <input type="checkbox" name="resource_type" value="{{ option.value }}" data-label="{{ option.label }}" class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-400" {% if option.selected %}checked{% endif %} @change="refresh()">
                  <span class="text-sm text-slate-700">{{ option.label }}</span>
                </label>
                {% endfor %}
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
    {% include "models/_results.html" %}
  </section>
</div>
{% endblock %}
