{% extends "base.html" %}

{% block content %}
<div class="space-y-8">
  <div>
    <h1 class="text-3xl font-semibold tracking-tight">Invocations</h1>
    <p class="mt-2 text-sm text-slate-600">Recent invocation state with HTMX-driven filtering.</p>
  </div>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200 px-5 py-4">
      <form id="invocation-filters"
            class="grid gap-4 md:grid-cols-2 xl:grid-cols-5"
            hx-get="/ui/invocations"
            hx-trigger="change delay:150ms"
            hx-target="#invocation-results"
            hx-select="#invocation-results"
            hx-swap="outerHTML"
            hx-push-url="true">
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Status</span>
          <select name="status" multiple size="6" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            {% for option in filters.status %}
            <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
          <span class="mt-1 block text-xs text-slate-400">Cmd/Ctrl-click to select multiple</span>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Execution Mode</span>
          <select name="execution_mode" multiple size="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            {% for option in filters.execution_mode %}
            <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
          <span class="mt-1 block text-xs text-slate-400">Cmd/Ctrl-click to select multiple</span>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Queue</span>
          <select name="worker_queue" multiple size="6" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            {% for option in filters.worker_queue %}
            <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
          <span class="mt-1 block text-xs text-slate-400">Cmd/Ctrl-click to select multiple</span>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Claimed By</span>
          <select name="claimed_by" multiple size="6" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            {% for option in filters.claimed_by %}
            <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
          <span class="mt-1 block text-xs text-slate-400">Cmd/Ctrl-click to select multiple</span>
        </label>
        <label class="text-sm text-slate-600">
          <span class="mb-1 block">Cancel State</span>
          <select name="cancel_state" multiple size="4" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            {% for option in filters.cancel_state %}
            <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
          <span class="mt-1 block text-xs text-slate-400">Cmd/Ctrl-click to select multiple</span>
        </label>
      </form>
    </div>
    {% include "invocations/_results.html" %}
  </section>
</div>
{% endblock %}
