<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/40 p-4">
  <div class="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white shadow-2xl">
    <div class="flex items-start justify-between border-b border-slate-200 px-6 py-4">
      <div>
        <h2 class="text-xl font-semibold tracking-tight text-slate-900">Create Remote Project</h2>
        <p class="mt-1 text-sm text-slate-600">Enter the repository and relative dbt project path. Validation will run on a worker.</p>
      </div>
      <button class="rounded-md px-2 py-1 text-slate-500 hover:bg-slate-100 hover:text-slate-900" onclick="document.getElementById('modal-root').innerHTML = ''">✕</button>
    </div>
    <form
      class="space-y-5 px-6 py-5"
      hx-post="/ui/project-drafts"
      hx-target="#project-draft-panel"
      hx-swap="innerHTML"
    >
      <div class="grid gap-4 md:grid-cols-2">
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-700">Git URL</span>
          <input
            name="git_repo_url"
            type="text"
            required
            value="{{ draft.git_repo_url }}"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900"
            placeholder="git@github.com:org/repo.git"
          >
        </label>
        <label class="block">
          <span class="mb-2 block text-sm font-medium text-slate-700">Relative Project Path</span>
          <input
            name="project_root"
            type="text"
            required
            value="{{ draft.project_root }}"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900"
            placeholder="analytics/jaffle_shop"
          >
        </label>
      </div>
      {% if error.is_some() %}
      <div class="rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
        {{ error.as_deref().unwrap_or("") }}
      </div>
      {% endif %}
      <div id="project-draft-panel"></div>
      <div class="flex items-center justify-end gap-3">
        <button type="button" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="document.getElementById('modal-root').innerHTML = ''">Cancel</button>
        <button type="submit" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Validate</button>
      </div>
    </form>
  </div>
</div>
