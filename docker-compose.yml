services:
  postgres:
    image: postgres:16-alpine
    container_name: dbtx-postgres
    environment:
      POSTGRES_USER: dbtx
      POSTGRES_PASSWORD: dbtx
      POSTGRES_DB: dbtx
    ports:
      - "55432:5432"
    volumes:
      - dbtx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbtx -d dbtx"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev-base
      args:
        RUST_BASE_IMAGE: ${DBTX_RUST_BASE_IMAGE:-rust:1.93-bookworm}
        DBTX_GITHUB_RELEASES_URL: ${DBTX_GITHUB_RELEASES_URL:-https://github.com}
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBTX_DATABASE_URL: postgres://dbtx:dbtx@postgres:5432/dbtx
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
      RUST_LOG: dbtx=info
    command:
      - cargo
      - run
      - --bin
      - dbtx-migrate
    restart: "no"
    volumes:
      - .:/workspace
      - dbtx-cargo-registry:/usr/local/cargo/registry
      - dbtx-cargo-git:/usr/local/cargo/git
      - dbtx-target:/workspace/target

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev-base
      args:
        RUST_BASE_IMAGE: ${DBTX_RUST_BASE_IMAGE:-rust:1.93-bookworm}
        DBTX_GITHUB_RELEASES_URL: ${DBTX_GITHUB_RELEASES_URL:-https://github.com}
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DBTX_DATABASE_URL: postgres://dbtx:dbtx@postgres:5432/dbtx
      DBTX_SECRET_KEY: local-dev-secret-key
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
      RUST_LOG: dbtx=info
    command:
      - cargo
      - run
      - --bin
      - dbtx-server
      - --
      - --listen
      - 0.0.0.0:8585
    ports:
      - "8585:8585"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8585/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - .:/workspace
      - dbtx-cargo-registry:/usr/local/cargo/registry
      - dbtx-cargo-git:/usr/local/cargo/git
      - dbtx-target:/workspace/target

  reconciler:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev-base
      args:
        RUST_BASE_IMAGE: ${DBTX_RUST_BASE_IMAGE:-rust:1.93-bookworm}
        DBTX_GITHUB_RELEASES_URL: ${DBTX_GITHUB_RELEASES_URL:-https://github.com}
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DBTX_DATABASE_URL: postgres://dbtx:dbtx@postgres:5432/dbtx
      DBTX_SECRET_KEY: local-dev-secret-key
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
      RUST_LOG: dbtx=info
    command:
      - cargo
      - run
      - --bin
      - dbtx-reconciler
    volumes:
      - .:/workspace
      - dbtx-cargo-registry:/usr/local/cargo/registry
      - dbtx-cargo-git:/usr/local/cargo/git
      - dbtx-target:/workspace/target

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: worker-dev
      args:
        RUST_BASE_IMAGE: ${DBTX_RUST_BASE_IMAGE:-rust:1.93-bookworm}
        DBTX_GITHUB_RELEASES_URL: ${DBTX_GITHUB_RELEASES_URL:-https://github.com}
        DBTX_FUSION_DOWNLOAD_URL: ${DBTX_FUSION_DOWNLOAD_URL:-https://public.cdn.getdbt.com/fs/install/install.sh}
    working_dir: /workspace
    depends_on:
      server:
        condition: service_healthy
    environment:
      DBTX_SERVICE_URL: http://server:8585
      DBTX_DBT_PATH: /usr/local/bin/dbt
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
      RUST_LOG: dbtx=info
    command:
      - cargo
      - run
      - --bin
      - dbtx-worker
      - --
      - --execution-mode
      - server
      - --queue
      - generic
    volumes:
      - .:/workspace
      - dbtx-cargo-registry:/usr/local/cargo/registry
      - dbtx-cargo-git:/usr/local/cargo/git
      - dbtx-target:/workspace/target
      - ${HOME}/.ssh:/root/.ssh:ro

volumes:
  dbtx-postgres-data:
  dbtx-cargo-registry:
  dbtx-cargo-git:
  dbtx-target:
