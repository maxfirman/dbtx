{% extends "base.html" %}

{% block content %}
<div class="space-y-8">
  <div class="flex items-center justify-between gap-4">
    <div>
      <a href="/ui/invocations" class="text-sm text-slate-500 hover:text-slate-900">← Back to invocations</a>
      <h1 class="mt-2 text-3xl font-semibold tracking-tight">Invocation {{ invocation.invocation_id }}</h1>
    </div>
  </div>

  {% include "invocations/_detail_panel.html" %}

  <link rel="stylesheet" href="/ui/assets/timeline.css">
  <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold">Build Timeline</h2>
    </div>
    <div id="timeline-root" style="min-height:120px;"></div>
  </section>
  <script>
    window.__TIMELINE_DATA__ = {
      sseUrl: '{{ sse_url }}',
      apiUrl: '{{ timeline_api_url }}'
    };
  </script>
  <script src="/ui/assets/timeline.js"></script>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm" x-data="invocationLogs('{{ sse_url }}', {{ initial_log_sequence }})">
      <div class="border-b border-slate-200 px-5 py-4">
        <h2 class="font-semibold">Logs</h2>
      </div>
      <div x-ref="log" class="max-h-[34rem] overflow-auto px-5 py-4 font-mono text-xs leading-6 text-slate-800">
        {% for line in initial_log_lines %}
        <div class="whitespace-pre-wrap">{{ line|safe }}</div>
        {% endfor %}
      </div>
  </section>
</div>
{% endblock %}
