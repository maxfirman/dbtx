<section
  class="rounded-xl border border-slate-200 bg-white shadow-sm"
  hx-get="/ui/dashboard/workers"
  hx-trigger="every 2s"
  hx-swap="outerHTML"
>
  <div class="border-b border-slate-200 px-5 py-4">
    <h2 class="font-semibold">Workers</h2>
  </div>
  <div class="divide-y divide-slate-100">
    {% if workers.len() == 0 %}
    <div class="px-5 py-6 text-sm text-slate-500">No active or idle workers.</div>
    {% else %}
    {% for worker in workers %}
    <div class="px-5 py-3 text-sm">
      <div class="flex items-center justify-between gap-4">
        <div>
          <div class="font-medium">{{ worker.worker_id }}</div>
          <div class="text-xs text-slate-500">{{ worker.execution_mode }} · {{ worker.worker_queues }}</div>
        </div>
        <span class="rounded-full px-2.5 py-1 text-xs font-medium {{ worker.health_class }}">{{ worker.health }}</span>
      </div>
    </div>
    {% endfor %}
    {% endif %}
  </div>
</section>
