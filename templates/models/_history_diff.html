<div class="mt-3 overflow-x-auto rounded-lg bg-slate-900 p-4 text-xs font-mono leading-relaxed">
  {% for line in diff_lines %}
  {% if line.kind == "add" %}
  <div class="text-emerald-400 bg-emerald-950/30">+ {{ line.text }}</div>
  {% else if line.kind == "remove" %}
  <div class="text-rose-400 bg-rose-950/30">- {{ line.text }}</div>
  {% else %}
  <div class="text-slate-400">  {{ line.text }}</div>
  {% endif %}
  {% endfor %}
  {% if diff_lines.is_empty() %}
  <div class="text-slate-500">No code diff available.</div>
  {% endif %}
</div>
