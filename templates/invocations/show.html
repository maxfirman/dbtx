{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center justify-between gap-4">
    <div>
      <a href="/ui/invocations" class="text-sm text-slate-500 hover:text-slate-900">← Back to invocations</a>
      <h1 class="mt-2 text-3xl font-semibold tracking-tight">Invocation {{ invocation.invocation_id }}</h1>
    </div>
  </div>

  {% include "invocations/_detail_panel.html" %}

  <div class="border-b border-slate-200">
    <nav id="invocation-tabs" class="-mb-px flex gap-6 text-sm font-medium">
      {% for tab in tabs %}
      <a href="{{ tab.url }}"
         hx-get="{{ tab.partial_url }}"
         hx-target="#tab-content"
         hx-swap="innerHTML"
         hx-push-url="{{ tab.url }}"
         data-tab="{{ tab.label }}"
         class="invocation-tab border-b-2 px-1 py-3 cursor-pointer {% if tab.active %}border-slate-900 text-slate-900{% else %}border-transparent text-slate-500 hover:border-slate-300 hover:text-slate-700{% endif %}">
        {{ tab.label }}
      </a>
      {% endfor %}
    </nav>
  </div>

  <div id="tab-content">
    {{ tab_content_html|safe }}
  </div>
</div>

<link rel="stylesheet" href="/ui/assets/lineage.css">
<script src="/ui/assets/lineage.js"></script>
<script>
  function dbtxInitLineage() {
    var dataEl = document.querySelector('script[type="dbtx/lineage-data"]');
    if (dataEl && window.__dbtxMountLineage) {
      try { window.__LINEAGE_DATA__ = JSON.parse(dataEl.textContent); } catch(e) { return; }
      window.__dbtxMountLineage();
    }
  }
  document.getElementById('invocation-tabs').addEventListener('click', function(e) {
    var tab = e.target.closest('.invocation-tab');
    if (!tab) return;
    this.querySelectorAll('.invocation-tab').forEach(function(t) {
      t.className = t.className
        .replace('border-slate-900', 'border-transparent')
        .replace('text-slate-900', 'text-slate-500');
      if (!t.className.includes('hover:border-slate-300')) {
        t.className += ' hover:border-slate-300 hover:text-slate-700';
      }
    });
    tab.className = tab.className
      .replace('border-transparent', 'border-slate-900')
      .replace('text-slate-500', 'text-slate-900')
      .replace(' hover:border-slate-300 hover:text-slate-700', '');
  });
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target && e.detail.target.id === 'tab-content') {
      setTimeout(dbtxInitLineage, 0);
    }
  });
  dbtxInitLineage();
</script>
{% endblock %}
